name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        version:
          - v5.15
          - v6.0
          - v6.6
          - v6.14

    name: Linux ${{matrix.version}}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Linux - Restore cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: linux
          key: ${{matrix.version}}-${{hashFiles('linux/config')}}

      - name: Linux - Download
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: ./checkout_linux.py --version ${{matrix.version}} --tarball

      - name: Linux - Build
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y libelf-dev
          ./make_linux.py --reconfig

      - name: Linux - Save cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: linux
          key: ${{matrix.version}}-${{hashFiles('linux/config')}}

      - name: Build
        run: make

      - name: QEMU - Restore cache
        id: restore-cache-qemu
        uses: actions/cache/restore@v4
        with:
          path: /usr/bin/qemu-system-x86_64
          key: qemu-10.1.2

      - name: QEMU - Download and build
        if: steps.restore-cache-qemu.outputs.cache-hit != 'true'
        run: |
          wget https://download.qemu.org/qemu-10.1.2.tar.xz
          tar -xvf qemu-10.1.2.tar.xz
          cd qemu-10.1.2
          ./configure --target-list=x86_64-softmmu --static --without-default-features --enable-kvm
          make -j$(nproc)
          sudo make install

      - name: QEMU - Save cache
        if: steps.restore-cache-qemu.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /usr/bin/qemu-system-x86_64
          key: qemu-10.1.2

      - name: Run QEMU
        timeout-minutes: 1
        run: ./run_qemu.py
