name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 0 * * 0" # Every week

jobs:
  qemu:
    name: Build QEMU
    runs-on: ubuntu-latest
    outputs:
      install_path: ${{ steps.build.outputs.install_path }}
      key: ${{ steps.build.outputs.key }}
    steps:
      - uses: actions/checkout@v6
      - id: build
        name: Build QEMU
        uses: ./.github/actions/build-qemu

  test:
    needs: qemu
    name: ${{ matrix.fuzz && 'Fuzz' || 'Run' }} ${{ matrix.version }}
    strategy:
      matrix:
        include:
          - version: v7.0  # latest
          - version: v6.18 # 2025 LTS
          - version: v6.12 # 2024 LTS
          - version: v6.6  # 2023 LTS
          - version: v6.1  # 2022 LTS
          - version: v5.15 # 2021 LTS
          - version: v6.18
            fuzz: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build Linux
        uses: ./.github/actions/build-linux
        with:
          version: ${{ matrix.version }}
          cov: ${{ matrix.fuzz }}

      - name: Build kSTEP
        run: make kstep LINUX_NAME=${{ matrix.version }}

      - name: "[Run] Execute driver"
        if: ${{ ! matrix.fuzz }}
        timeout-minutes: 1
        run: ./run.py --linux_name ${{ matrix.version }}

      - name: "[Run] Show driver output"
        if: ${{ ! matrix.fuzz }}
        run: cat data/latest.jsonl

      - name: "[Fuzz] Execute workers"
        if: ${{ matrix.fuzz }}
        timeout-minutes: 5
        run: |
          ./fuzz.py \
            --linux_name ${{ matrix.version }} \
            --workers 1 \
            --steps 10 \
            --ci_mode

      - name: "[Fuzz] Show fresh-mode log"
        if: ${{ matrix.fuzz }}
        run: cat data/fuzz/fresh/worker.debug.log

      - name: "[Fuzz] Show replay-mode log"
        if: ${{ matrix.fuzz }}
        run: cat data/fuzz/replay/worker.debug.log

      - name: "[Fuzz] Show mutation-mode log"
        if: ${{ matrix.fuzz }}
        run: cat data/fuzz/mutation/worker.debug.log
