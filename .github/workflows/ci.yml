name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        version:
          - v5.15
          - v6.0
          - v6.6
          - v6.14
          - v6.18-rc6

    name: Linux ${{matrix.version}}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore Linux cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: linux/current
          key: ${{matrix.version}}

      - name: Download Linux
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: ./checkout_linux.py --version ${{matrix.version}} --tarball

      - name: Build Linux
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y libelf-dev
          ./make_linux.py --reconfig

      - name: Save Linux cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: linux/current
          key: ${{matrix.version}}

      - name: Build kernel module
        run: make -C kmod

      - name: Install QEMU
        run: sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y qemu-kvm

      - name: Run QEMU
        timeout-minutes: 1
        run: ./run_qemu.py
