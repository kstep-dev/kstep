name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        version: # LTS versions at https://kernel.org/
          - v6.18
          - v6.12.60
          - v6.6.118
          - v6.1.158
          - v5.15.196

    name: Linux ${{matrix.version}}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Linux - Restore cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: linux
          key: ${{matrix.version}}-${{hashFiles('linux/config.kstep')}}

      - name: Linux - Download
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: ./checkout_linux.py --version ${{matrix.version}} --tarball

      - name: Linux - Build
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y libelf-dev
          ./make_linux.py --reconfig

      - name: Linux - Save cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: linux
          key: ${{matrix.version}}-${{hashFiles('linux/config.kstep')}}

      - name: Build
        run: make

      - name: Install QEMU
        run: sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y qemu-kvm

      - name: Run QEMU
        timeout-minutes: 1
        run: ./run_qemu.py
