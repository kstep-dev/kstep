name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    strategy:
      matrix:
        version: [
          {major: 5, minor: 15},
          {major: 6, minor: 1},
          {major: 6, minor: 6},
          {major: 6, minor: 14},
        ]

    name: Linux ${{matrix.version.major}}.${{matrix.version.minor}}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore Linux cache
        id: restore-cache
        uses: actions/cache/restore@v4
        with:
          path: linux/current
          key: ${{matrix.version.major}}.${{matrix.version.minor}}

      - name: Download Linux
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p linux/current
          wget https://cdn.kernel.org/pub/linux/kernel/v${{matrix.version.major}}.x/linux-${{matrix.version.major}}.${{matrix.version.minor}}.tar.xz -O linux.tar.xz
          tar -xvf linux.tar.xz -C linux/current --strip-components=1

      - name: Build Linux
        if: steps.restore-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y libelf-dev
          ./make_linux.py --reconfig

      - name: Save Linux cache
        if: steps.restore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: linux/current
          key: ${{matrix.version.major}}.${{matrix.version.minor}}

      - name: Build kernel module
        run: make -C kmod

      - name: Install QEMU
        run: sudo rm -f /var/lib/man-db/auto-update && sudo apt update && sudo apt install -y qemu-kvm

      - name: Run QEMU
        timeout-minutes: 1
        run: ./run_qemu.py
