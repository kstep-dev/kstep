name: CI

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: "0 0 * * 0" # Every week

jobs:
  deps:
    name: Cache deps
    runs-on: ubuntu-latest
    outputs:
      key: ${{ steps.cache.outputs.key }}
    steps:
      - uses: actions/checkout@v6
      - name: Cache deps
        id: cache
        uses: ./.github/actions/cache-deps
        with:
          packages: qemu-system-x86 libelf-dev musl-tools

  test:
    needs: deps
    name: ${{ matrix.fuzz && 'Fuzz' || 'Run' }} ${{ matrix.version }}
    strategy:
      matrix:
        include:
          - version: v7.0  # latest
          - version: v6.18 # 2025 LTS
          - version: v6.12 # 2024 LTS
          - version: v6.6  # 2023 LTS
          - version: v6.1  # 2022 LTS
          - version: v5.15 # 2021 LTS
          - version: v6.18
            fuzz: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Restore deps
        uses: ./.github/actions/restore-deps
        with:
          key: ${{ needs.deps.outputs.key }}

      - name: Build Linux
        uses: ./.github/actions/build-linux
        with:
          version: ${{ matrix.version }}
          cov: ${{ matrix.fuzz }}

      - name: Build kSTEP
        run: make kstep NAME=${{ matrix.version }}

      - name: "[Run] Execute driver"
        if: ${{ ! matrix.fuzz }}
        timeout-minutes: 1
        run: ./run.py --name ${{ matrix.version }}

      - name: "[Run] Show driver output"
        if: ${{ ! matrix.fuzz }}
        run: cat results/latest/kstep.jsonl

      - name: "[Fuzz] Execute workers"
        if: ${{ matrix.fuzz }}
        timeout-minutes: 5
        run: |
          ./fuzz.py \
            --name ${{ matrix.version }} \
            --workers 1 \
            --steps 10 \
            --ci_mode

      - name: "[Fuzz] Show fresh-mode log"
        if: ${{ matrix.fuzz }}
        run: cat results/fuzz/fresh/worker.debug.log

      - name: "[Fuzz] Show replay-mode log"
        if: ${{ matrix.fuzz }}
        run: cat results/fuzz/replay/worker.debug.log

      - name: "[Fuzz] Show mutation-mode log"
        if: ${{ matrix.fuzz }}
        run: cat results/fuzz/mutation/worker.debug.log
